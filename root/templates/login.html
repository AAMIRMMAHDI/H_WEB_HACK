<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل مدیریت پیشرفته</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --accent-color: #00cec9;
            --success-color: #00ff9d;
            --danger-color: #ff2c75;
            --warning-color: #ffdd59;
            --info-color: #00b4ff;
            --dark-bg: #0f0f1f;
            --dark-card: #1a1a2e;
            --neon-glow: 0 0 10px, 0 0 20px, 0 0 30px;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0f0f1f 0%, #1a1a2e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 206, 201, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100vw) rotate(360deg);
                opacity: 0;
            }
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            perspective: 1000px;
            z-index: 10;
        }

        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 
                0 0 20px rgba(108, 92, 231, 0.5),
                0 0 40px rgba(108, 92, 231, 0.3),
                inset 0 0 15px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        .auth-card:hover {
            transform: translateY(-5px) rotateX(5deg);
            box-shadow: 
                0 0 30px rgba(108, 92, 231, 0.7),
                0 0 60px rgba(108, 92, 231, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .auth-header {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.3) 0%, rgba(162, 155, 254, 0.3) 100%);
            color: white;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(108, 92, 231, 0.3);
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: rotate(45deg) translate(-30%, -30%); }
            100% { transform: rotate(45deg) translate(30%, 30%); }
        }

        .auth-logo {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: white;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
        }

        .auth-title {
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(108, 92, 231, 0.5);
        }

        .auth-subtitle {
            opacity: 0.9;
            font-size: 0.9rem;
            color: #ccc;
        }

        .auth-body {
            padding: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 500;
            color: #fff;
        }

        .form-control {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border: 2px solid rgba(108, 92, 231, 0.3);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: rgba(15, 15, 31, 0.5);
            color: white;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 1.2rem;
            text-shadow: 0 0 5px var(--primary-color);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.5);
            position: relative;
            overflow: hidden;
        }

        .btn-auth::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.7);
        }

        .btn-auth:hover::before {
            left: 100%;
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        .auth-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(108, 92, 231, 0.5);
        }

        .auth-link:hover {
            color: var(--secondary-color);
            text-decoration: underline;
            text-shadow: 0 0 10px rgba(162, 155, 254, 0.7);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.8rem 0;
            color: #777;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid rgba(108, 92, 231, 0.3);
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 1.5rem;
        }

        .btn-social {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-social::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-social:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-social:hover::before {
            left: 100%;
        }

        .btn-google {
            background: linear-gradient(135deg, #4285F4 0%, #DB4437 100%);
        }

        .btn-microsoft {
            background: linear-gradient(135deg, #0078D4 0%, #00A1F1 100%);
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 1.8rem;
        }

        .remember-me input {
            margin-left: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }

        .remember-me label {
            color: #ccc;
        }

        .alert-auth {
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            border: none;
            background: rgba(255, 44, 117, 0.2);
            color: white;
            border: 1px solid rgba(255, 44, 117, 0.3);
            box-shadow: 0 0 15px rgba(255, 44, 117, 0.3);
        }

        .alert-auth i {
            margin-left: 10px;
            font-size: 1.3rem;
            color: var(--danger-color);
            text-shadow: 0 0 5px var(--danger-color);
        }

        /* انیمیشن های خاص */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* رسپانسیو */
        @media (max-width: 576px) {
            .auth-container {
                max-width: 90%;
            }
            
            .auth-header {
                padding: 1.8rem;
            }
            
            .auth-body {
                padding: 1.8rem;
            }
            
            .auth-logo {
                font-size: 3rem;
            }
            
            .auth-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- ذرات شناور در پس‌زمینه -->
    <div class="particles" id="particles"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="auth-title">ورود به پنل مدیریت</h2>
                <p class="auth-subtitle">سیستم نظارت و کنترل پیشرفته</p>
            </div>
            <div class="auth-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="alert alert-danger alert-auth fade show">
                        <i class="fas fa-exclamation-circle"></i>
                        نام کاربری یا رمز عبور اشتباه است
                        <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1);"></button>
                    </div>
                    {% endif %}
                    
                    <div class="form-group">
                        <label for="username" class="form-label">نام کاربری</label>
                        <div class="position-relative">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="نام کاربری خود را وارد کنید">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">رمز عبور</label>
                        <div class="position-relative">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="رمز عبور خود را وارد کنید">
                        </div>
                    </div>
                    
                    <div class="remember-me">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">مرا به خاطر بسپار</label>
                    </div>
                    
                    <button type="submit" class="btn btn-auth pulse">
                        <i class="fas fa-sign-in-alt me-2"></i>
                        ورود به سیستم
                    </button>
                </form>
                
                <div class="divider">
                    <span>یا ورود با</span>
                </div>
                
                <div class="social-login">
                    <a href="#" class="btn-social btn-google">
                        <i class="fab fa-google"></i>
                    </a>
                    <a href="#" class="btn-social btn-microsoft">
                        <i class="fab fa-microsoft"></i>
                    </a>
                </div>
                
                <div class="auth-footer">
                    <a href="#" class="auth-link">
                        <i class="fas fa-key me-1"></i>
                        بازیابی رمز عبور
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ایجاد ذرات شناور در پس‌زمینه
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // اندازه تصادفی
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // موقعیت تصادفی
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                particle.style.left = `${posX}vw`;
                particle.style.top = `${posY}vh`;
                
                // تاخیر و مدت انیمیشن تصادفی
                const delay = Math.random() * 15;
                const duration = Math.random() * 10 + 15;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                
                // رنگ تصادفی
                const colors = [
                    'rgba(108, 92, 231, 0.7)',
                    'rgba(162, 155, 254, 0.7)',
                    'rgba(0, 206, 201, 0.7)',
                    'rgba(0, 255, 157, 0.7)'
                ];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = randomColor;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // انیمیشن ورود
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            
            const authCard = document.querySelector('.auth-card');
            authCard.style.opacity = '0';
            authCard.style.transform = 'translateY(30px) rotateX(-15deg)';
            
            setTimeout(() => {
                authCard.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                authCard.style.opacity = '1';
                authCard.style.transform = 'translateY(0) rotateX(0)';
            }, 100);
        });
    </script>
</body>
</html>
